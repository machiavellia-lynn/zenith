<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zenith — Sector Overview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pikaday/1.8.2/css/pikaday.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pikaday/1.8.2/pikaday.min.js"></script>
<style>
:root{--bg:#080c10;--surface:#0e1318;--surface2:#121920;--border:#1a2230;--border2:#243040;--accent:#00e8a2;--accent2:#4d9fff;--danger:#ff4d6a;--text:#c8d8e8;--muted:#bfcbd4;--up:#00e8a2;--down:#ff4d6a}
*{box-sizing:border-box;margin:0;padding:0;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;min-height:100vh}
header{display:flex;align-items:center;gap:16px;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:200}
header::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,232,162,.3),transparent)}
.logo{display:flex;align-items:center;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;white-space:nowrap;text-decoration:none}
.logo-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-right:8px;flex-shrink:0;animation:dotPulse 2.4s ease-in-out infinite}
@keyframes dotPulse{0%,100%{box-shadow:0 0 6px var(--accent),0 0 0 0 rgba(0,232,162,.5)}50%{box-shadow:0 0 14px var(--accent),0 0 0 5px rgba(0,232,162,0)}}
@keyframes btnPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,232,162,.45),0 0 8px rgba(0,232,162,.25)}50%{box-shadow:0 0 0 7px rgba(0,232,162,0),0 0 16px rgba(0,232,162,.5)}}
.info-btn.pulse{border-color:rgba(0,232,162,.5);color:var(--accent);animation:btnPulse 2.4s ease-in-out infinite}
.info-btn.pulse:hover{animation:none;box-shadow:0 0 16px rgba(0,232,162,.5)}
.logo-sub{color:var(--muted)}
.nav-group{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:3px;gap:2px}
.nav-btn{background:none;border:1px solid transparent;color:var(--muted);border-radius:4px;padding:4px 12px;cursor:pointer;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.06em;text-decoration:none;transition:all .15s}
.nav-btn:hover{color:var(--accent)}
.nav-btn.active{background:var(--surface);border-color:rgba(0,232,162,.25);color:var(--accent)}
.ihsg-wrap{margin-left:auto;display:flex;align-items:center;gap:8px;font-family:'Space Mono',monospace}
.ihsg-label{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.ihsg-price{font-size:13px;font-weight:700;color:var(--text)}
.ihsg-gain{font-size:11px;font-weight:700}
.info-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:50%;width:28px;height:28px;cursor:pointer;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none}
.info-btn:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 0 8px rgba(0,232,162,.2)}
.info-btn svg{width:13px;height:13px}
.toolbar{display:flex;align-items:center;gap:12px;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--surface2)}
.date-range{display:flex;align-items:center;gap:8px}
.date-input{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:6px 10px;font-family:'Space Mono',monospace;font-size:11px;outline:none;width:108px;letter-spacing:.04em;transition:border-color .2s}
.date-input:focus{border-color:var(--accent)}
.date-input::placeholder{color:var(--muted)}
.date-arrow{width:28px;height:28px;background:var(--border);border:1px solid var(--border2);border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px}
.row-count{margin-left:auto;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.06em}
.sector-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:24px;max-width:1200px;margin:0 auto}
@media(max-width:900px){.sector-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.sector-grid{grid-template-columns:1fr}}
.sector-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:border-color .2s,box-shadow .2s,transform .15s;display:flex;flex-direction:column;gap:14px}
.sector-card:hover{border-color:var(--accent);box-shadow:0 0 20px rgba(0,232,162,.08);transform:translateY(-2px)}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between}
.sc-name{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text)}
.sc-gain{font-family:'Space Mono',monospace;font-size:20px;font-weight:700}
.sc-gain.up{color:var(--up)}.sc-gain.down{color:var(--down)}.sc-gain.zero{color:var(--muted)}
.sc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sc-stat{display:flex;flex-direction:column;gap:2px}
.sc-stat-label{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
.sc-stat-val{font-family:'Space Mono',monospace;font-size:12px;font-weight:700}
.sc-stat-val.cm-pos{color:var(--up)}.sc-stat-val.cm-neg{color:var(--down)}
.sc-stat-val.sm{color:var(--accent2)}.sc-stat-val.bm{color:#ff8c42}
.sc-stat-val.mfp{color:var(--up)}.sc-stat-val.mfm{color:var(--down)}
.sc-stat-val.net-pos{color:var(--up)}.sc-stat-val.net-neg{color:var(--down)}
.sc-footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:10px;margin-top:2px}
.sc-tickers{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.06em}
.sc-arrow{color:var(--muted);font-size:14px;transition:color .15s}
.sector-card:hover .sc-arrow{color:var(--accent)}
.detail-header{display:flex;align-items:center;gap:16px;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--surface)}
.detail-name{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
.detail-stats{display:flex;gap:0;padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
.dst-item{display:flex;align-items:center;gap:8px;padding:10px 20px 10px 0;margin-right:20px;border-right:1px solid var(--border);white-space:nowrap}
.dst-item:last-child{border-right:none}
.dst-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.dst-val{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--text)}
.dst-val.up{color:var(--up)}.dst-val.down{color:var(--down)}.dst-val.sm{color:var(--accent2)}.dst-val.bm{color:#ff8c42}
.table-wrap{flex:1;overflow:auto;padding:0 24px 24px}
.flow-table{width:100%;border-collapse:collapse;margin-top:12px}
.flow-table thead th{position:sticky;top:0;z-index:10;background:var(--surface2);border-bottom:1px solid var(--border2);padding:9px 12px;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--muted);text-align:right;text-transform:uppercase;white-space:nowrap}
.flow-table thead th:first-child{text-align:left}
.flow-table tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
.flow-table tbody tr:hover{background:rgba(255,255,255,.03)}
.flow-table td{padding:9px 12px;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.flow-table td:first-child{text-align:left}
.td-ticker{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--text);letter-spacing:.04em}
.td-num{font-family:'Space Mono',monospace;font-size:11px;color:var(--text)}
.td-num.sm{color:var(--accent2)}.td-num.bm{color:#ff8c42}
.td-num.mfp{color:var(--up)}.td-num.mfm{color:var(--down)}
.gain-val{font-family:'Space Mono',monospace;font-size:11px;font-weight:700}
.gain-val.pos{color:var(--up)}.gain-val.neg{color:var(--down)}.gain-val.zero{color:var(--muted)}
.cm-val{font-family:'Space Mono',monospace;font-size:12px;font-weight:700}
.cm-val.pos{color:var(--up)}.cm-val.neg{color:var(--down)}
.rsm-val{font-family:'Space Mono',monospace;font-size:11px;font-weight:700}
.loading-wrap{display:flex;align-items:center;justify-content:center;padding:80px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal /* ── MODAL ───────────────────────────────────────── */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.82);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  width: 100%;
  max-width: 1100px;
  height: 92vh;
  max-height: 92vh;
  display: flex; flex-direction: column;
  transform: scale(.97); transition: transform .2s;
  overflow: hidden;
  flex-shrink: 0;
}
.modal-backdrop.open .modal { transform: scale(1); }

.modal-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.modal-ticker {
  font-family: 'Space Mono', monospace;
  font-size: 16px; font-weight: 700;
  color: var(--text);
}
.modal-name { font-size: 12px; color: var(--muted); }
.modal-price {
  font-family: 'Space Mono', monospace;
  font-size: 18px; font-weight: 700; color: var(--text);
  margin-left: auto;
}

/* modal tf tabs */
.modal-tfs { display: flex; gap: 6px; }
.mtf-btn {
  background: none; border: 1px solid var(--border);
  color: var(--muted); border-radius: 4px;
  padding: 3px 10px; cursor: pointer;
  font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: .06em;
  transition: all .15s;
}
.mtf-btn:hover { border-color: var(--accent); color: var(--accent); }
.mtf-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

/* fit/log buttons */
.modal-scale-btns { display: flex; gap: 4px; }

.close-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 20px; line-height: 1;
  padding: 2px 6px; transition: color .15s;
}
.close-btn:hover { color: var(--danger); }

/* modal hover tooltip */
.m-hover-tooltip {
  position: absolute; top: 12px; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex; align-items: center; gap: 14px;
  background: rgba(14,19,24,.92);
  border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 12px;
  font-family: 'Space Mono', monospace; font-size: 10px;
  pointer-events: none; opacity: 0; transition: opacity .15s;
  white-space: nowrap;
}
.m-hover-tooltip.visible { opacity: 1; }
.mht-item { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.mht-lbl { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
.mht-v { font-size: 11px; font-weight: 700; color: var(--text); }
.mht-v.up { color: var(--up); }
.mht-v.down { color: var(--down); }
.mht-sep { width: 1px; height: 26px; background: var(--border); }

.modal-scroll {
  flex: 1 1 0;
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  /* custom scrollbar — tipis & nempel di ujung kanan */
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.modal-scroll::-webkit-scrollbar { width: 6px; }
.modal-scroll::-webkit-scrollbar-track { background: transparent; }
.modal-scroll::-webkit-scrollbar-thumb {
  background: var(--border2); border-radius: 3px;
}
.modal-scroll::-webkit-scrollbar-thumb:hover { background: var(--muted); }

.modal-chart-wrap {
  position: relative;
  height: 480px;
  flex-shrink: 0;
  overflow: visible;
}
#modalChart { width: 100%; height: 100%; display: block; position: relative; overflow: visible; }
/* Paksa LWC internal div tidak clip time axis */
#modalChart > div { overflow: visible !important; }


/* ── MODAL TRANSACTIONS ──────────────────────────────── */
.modal-body {
  padding: 16px 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.trx-section-title {
  font-family: 'Space Mono', monospace;
  font-size: 11px; letter-spacing: .14em; font-weight: 700;
  color: var(--muted); text-transform: uppercase;
  display: flex; align-items: center; gap: 12px;
  white-space: nowrap;
}
.trx-section-title::after {
  content: ''; flex: 1; height: 1px;
  background: var(--border);
}
.trx-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.trx-date-range {
  display: flex; align-items: center; gap: 6px;
}
.trx-date-input {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); border-radius: 5px;
  padding: 5px 8px; font-family: 'Space Mono', monospace;
  font-size: 10px; outline: none; width: 96px;
  letter-spacing: .04em; transition: border-color .2s;
}
.trx-date-input:focus { border-color: var(--accent); }
.trx-date-input::placeholder { color: var(--muted); }
.trx-date-arrow {
  color: var(--muted); font-size: 11px; padding: 0 2px;
}
.trx-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.trx-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  height: 260px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.trx-box-header {
  padding: 6px 12px;
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: .1em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 8px; align-items: center;
  flex-shrink: 0;
  background: var(--bg);
  z-index: 1;
}
.trx-box-header.sm { color: var(--accent2); }
.trx-box-header.bm { color: #ff8c42; }
.trx-box-header .trx-count {
  color: var(--muted); font-size: 8px;
}
.trx-table-wrap {
  flex: 1 1 0;
  min-height: 0;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.trx-table-wrap::-webkit-scrollbar { width: 5px; }
.trx-table-wrap::-webkit-scrollbar-track { background: transparent; }
.trx-table-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.trx-table-wrap::-webkit-scrollbar-thumb:hover { background: var(--muted); }
.trx-table { width: 100%; border-collapse: collapse; }
.trx-table thead th {
  position: sticky; top: 0; z-index: 1;
  background: var(--bg);
}
.trx-table th {
  padding: 5px 10px;
  font-family: 'Space Mono', monospace;
  font-size: 8px; letter-spacing: .1em;
  color: var(--muted); text-transform: uppercase;
  text-align: right; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.trx-table th:first-child { text-align: left; }
.trx-table td {
  padding: 5px 10px;
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--text);
  text-align: right;
  border-bottom: 1px solid rgba(26,34,48,.5);
  white-space: nowrap;
}
.trx-table td:first-child { text-align: left; color: var(--muted); }
.trx-table tbody tr:last-child td { border-bottom: none; }
.trx-table tbody tr:hover { background: rgba(255,255,255,.02); }
.trx-gain-pos { color: var(--up); }
.trx-gain-neg { color: var(--down); }
.trx-mf-sm { color: var(--accent2); }
.trx-mf-bm { color: #ff8c42; }
/* ── OVERLAY TOGGLES ─────────────────────────────── */
.overlay-toggles { display: flex; gap: 4px; margin-left: 8px; }
.ovl-btn {
  background: none; border: 1px solid var(--border);
  color: var(--muted); border-radius: 4px;
  padding: 3px 10px; cursor: pointer;
  font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: .06em;
  transition: all .15s;
  display: flex; align-items: center; gap: 5px;
}
.ovl-btn .ovl-dot {
  width: 7px; height: 7px; border-radius: 50%;
  opacity: .4; transition: opacity .15s;
}
.ovl-btn:hover { border-color: var(--text); color: var(--text); }
.ovl-btn.active { border-color: currentColor; }
.ovl-btn.active .ovl-dot { opacity: 1; }
.ovl-btn.active.cm { color: #00e8a2; }
.ovl-btn.active.sm { color: #4d9fff; }
.ovl-btn.active.bm { color: #ff8c42; }

/* overlay value panel top-left */
.m-overlay-vals {
  position: absolute; top: 12px; left: 14px;
  z-index: 10; display: flex; flex-direction: column; gap: 2px;
  pointer-events: none;
}
.m-ovl-row {
  font-family: 'Space Mono', monospace;
  font-size: 11px; font-weight: 700;
  opacity: 0; transition: opacity .15s;
}
.m-ovl-row.visible { opacity: 1; }
.m-ovl-row .m-ovl-label {
  font-size: 9px; font-weight: 400;
  letter-spacing: .08em; margin-right: 6px;
}

.trx-empty { padding: 20px; text-align: center; color: var(--muted); font-size: 11px; }
.trx-loading { padding: 20px; text-align: center; color: var(--muted); font-size: 11px; }

.pika-single{z-index:600!important}

.mht-lbl { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
.mht-v { font-size: 11px; font-weight: 700; color: var(--text); }
.mht-v.up { color: var(--up); }
.mht-v.down { color: var(--down); }
.mht-sep { width: 1px; height: 26px; background: var(--border); }

.modal-scroll {
  flex: 1 1 0;
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  /* custom scrollbar — tipis & nempel di ujung kanan */
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.modal-scroll::-webkit-scrollbar { width: 6px; }
.modal-scroll::-webkit-scrollbar-track { background: transparent; }
.modal-scroll::-webkit-scrollbar-thumb {
  background: var(--border2); border-radius: 3px;
}
.modal-scroll::-webkit-scrollbar-thumb:hover { background: var(--muted); }

.modal-chart-wrap {
  position: relative;
  height: 480px;
  flex-shrink: 0;
  overflow: visible;
}
#modalChart { width: 100%; height: 100%; display: block; position: relative; overflow: visible; }
/* Paksa LWC internal div tidak clip time axis */
#modalChart > div { overflow: visible !important; }


/* ── MODAL TRANSACTIONS ──────────────────────────────── */
.modal-body {
  padding: 16px 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.trx-section-title {
  font-family: 'Space Mono', monospace;
  font-size: 11px; letter-spacing: .14em; font-weight: 700;
  color: var(--muted); text-transform: uppercase;
  display: flex; align-items: center; gap: 12px;
  white-space: nowrap;
}
.trx-section-title::after {
  content: ''; flex: 1; height: 1px;
  background: var(--border);
}
.trx-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.trx-date-range {
  display: flex; align-items: center; gap: 6px;
}
.trx-date-input {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); border-radius: 5px;
  padding: 5px 8px; font-family: 'Space Mono', monospace;
  font-size: 10px; outline: none; width: 96px;
  letter-spacing: .04em; transition: border-color .2s;
}
.trx-date-input:focus { border-color: var(--accent); }
.trx-date-input::placeholder { color: var(--muted); }
.trx-date-arrow {
  color: var(--muted); font-size: 11px; padding: 0 2px;
}
.trx-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.trx-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  height: 260px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.trx-box-header {
  padding: 6px 12px;
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: .1em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 8px; align-items: center;
  flex-shrink: 0;
  background: var(--bg);
  z-index: 1;
}
.trx-box-header.sm { color: var(--accent2); }
.trx-box-header.bm { color: #ff8c42; }
.trx-box-header .trx-count {
  color: var(--muted); font-size: 8px;
}
.trx-table-wrap {
  flex: 1 1 0;
  min-height: 0;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.trx-table-wrap::-webkit-scrollbar { width: 5px; }
.trx-table-wrap::-webkit-scrollbar-track { background: transparent; }
.trx-table-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.trx-table-wrap::-webkit-scrollbar-thumb:hover { background: var(--muted); }
.trx-table { width: 100%; border-collapse: collapse; }
.trx-table thead th {
  position: sticky; top: 0; z-index: 1;
  background: var(--bg);
}
.trx-table th {
  padding: 5px 10px;
  font-family: 'Space Mono', monospace;
  font-size: 8px; letter-spacing: .1em;
  color: var(--muted); text-transform: uppercase;
  text-align: right; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.trx-table th:first-child { text-align: left; }
.trx-table td {
  padding: 5px 10px;
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--text);
  text-align: right;
  border-bottom: 1px solid rgba(26,34,48,.5);
  white-space: nowrap;
}
.trx-table td:first-child { text-align: left; color: var(--muted); }
.trx-table tbody tr:last-child td { border-bottom: none; }
.trx-table tbody tr:hover { background: rgba(255,255,255,.02); }
.trx-gain-pos { color: var(--up); }
.trx-gain-neg { color: var(--down); }
.trx-mf-sm { color: var(--accent2); }
.trx-mf-bm { color: #ff8c42; }
/* ── OVERLAY TOGGLES ─────────────────────────────── */
.overlay-toggles { display: flex; gap: 4px; margin-left: 8px; }
.ovl-btn {
  background: none; border: 1px solid var(--border);
  color: var(--muted); border-radius: 4px;
  padding: 3px 10px; cursor: pointer;
  font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: .06em;
  transition: all .15s;
  display: flex; align-items: center; gap: 5px;
}
.ovl-btn .ovl-dot {
  width: 7px; height: 7px; border-radius: 50%;
  opacity: .4; transition: opacity .15s;
}
.ovl-btn:hover { border-color: var(--text); color: var(--text); }
.ovl-btn.active { border-color: currentColor; }
.ovl-btn.active .ovl-dot { opacity: 1; }
.ovl-btn.active.cm { color: #00e8a2; }
.ovl-btn.active.sm { color: #4d9fff; }
.ovl-btn.active.bm { color: #ff8c42; }

/* overlay value panel top-left */
.m-overlay-vals {
  position: absolute; top: 12px; left: 14px;
  z-index: 10; display: flex; flex-direction: column; gap: 2px;
  pointer-events: none;
}
.m-ovl-row {
  font-family: 'Space Mono', monospace;
  font-size: 11px; font-weight: 700;
  opacity: 0; transition: opacity .15s;
}
.m-ovl-row.visible { opacity: 1; }
.m-ovl-row .m-ovl-label {
  font-size: 9px; font-weight: 400;
  letter-spacing: .08em; margin-right: 6px;
}

.trx-empty { padding: 20px; text-align: center; color: var(--muted); font-size: 11px; }
.trx-loading { padding: 20px; text-align: center; color: var(--muted); font-size: 11px; }
.modal .pika-single{z-index:600!important}
.pika-single{background:var(--surface2)!important;border:1px solid var(--border2)!important;border-radius:8px!important;font-family:'DM Sans',sans-serif!important;color:var(--text)!important;box-shadow:0 8px 32px rgba(0,0,0,.5)!important}
.pika-title{padding:8px 10px!important}
.pika-label{background:transparent!important;color:var(--text)!important;font-family:'Space Mono',monospace!important;font-size:12px!important}
.pika-prev,.pika-next{color:var(--muted)!important;opacity:1!important}
.pika-prev:hover,.pika-next:hover{color:var(--accent)!important}
.pika-table th{color:var(--muted)!important;font-size:10px!important;font-family:'Space Mono',monospace!important}
.pika-button{background:transparent!important;color:var(--text)!important;border-radius:4px!important;font-size:12px!important;text-align:center!important}
.pika-button:hover,.is-selected .pika-button{background:var(--accent)!important;color:var(--bg)!important}
.is-today .pika-button{color:var(--accent)!important;font-weight:700!important}
.is-disabled .pika-button{color:var(--muted)!important;opacity:.4!important}
.pika-select{background:var(--surface)!important;color:var(--text)!important;border:1px solid var(--border)!important}

.info-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:50%;width:24px;height:24px;cursor:pointer;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.info-btn:hover{border-color:var(--accent);color:var(--accent)}
.info-backdrop{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.info-backdrop.open{opacity:1;pointer-events:all}
.info-modal{background:var(--surface);border:1px solid var(--border2);border-radius:10px;width:min(90vw,760px);max-height:85vh;display:flex;flex-direction:column;transform:scale(.97);transition:transform .2s;overflow:hidden}
.info-backdrop.open .info-modal{transform:scale(1)}
.info-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.info-title{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.1em;color:var(--accent)}
.info-sub{font-size:11px;color:var(--muted);margin-top:2px}
.info-body{overflow-y:auto;padding:20px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.info-body::-webkit-scrollbar{width:5px}
.info-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.info-section{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.info-section:last-child{border-bottom:none;margin-bottom:0}
.info-section-title{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--accent);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.info-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.info-p{font-size:12px;color:var(--text);line-height:1.65;margin-bottom:8px}
.info-p:last-child{margin-bottom:0}
.info-highlight{background:rgba(0,232,162,.07);border-left:3px solid var(--accent);border-radius:0 4px 4px 0;padding:10px 14px;margin:10px 0;font-family:'Space Mono',monospace;font-size:11px;color:var(--text);line-height:1.6}
.info-highlight.danger{background:rgba(255,77,106,.07);border-left-color:var(--danger)}
.info-highlight.neutral{background:rgba(77,159,255,.07);border-left-color:var(--accent2)}
.info-glossary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
@media(max-width:560px){.info-glossary{grid-template-columns:1fr}}
.info-term{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px 14px}
.info-term-label{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.08em;margin-bottom:4px}
.info-term-label.cm{color:var(--up)}.info-term-label.sm{color:var(--accent2)}.info-term-label.bm{color:#ff8c42}.info-term-label.muted{color:var(--muted)}
.info-term-desc{font-size:11px;color:var(--muted);line-height:1.5}
.info-scenarios{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.info-scenario{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px 14px}
.info-scenario-title{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:var(--text);letter-spacing:.06em;margin-bottom:6px}
.info-scenario-desc{font-size:11px;color:var(--muted);line-height:1.5}



/* ── RESPONSIVE ──────────────────────────── */
@media(max-width:768px){
  header{flex-wrap:wrap;gap:6px;padding:8px 12px}
  .logo{font-size:11px;letter-spacing:.12em}
  .nav-divider{display:none}
  .nav-btn{padding:4px 10px;font-size:10px}

  .dst-item{padding:8px 10px;margin-right:0;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}

  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 0 12px}

}

<script>
let activeSector = null;
let sectorDetailRows = [];
let sectorSortCol = 'clean_money';
let sectorSortAsc = false;

let modalChart = null, modalCandle = null, modalVolume = null;
let modalTF = '1d', modalTicker = '', modalIsLog = false, modalIsAuto = true;
const INIT_CANDLES = 150;
let ovlSeriesCM = null, ovlSeriesSM = null, ovlSeriesBM = null;
let ovlShowCM = true, ovlShowSM = false, ovlShowBM = false;
let overlayDataCache = [];
let modalPrevCloseMap = {};
let trxPickerFrom = null, trxPickerTo = null;

function openModal(ticker) {
  modalTicker = ticker;
  modalTF     = '1d';
  modalIsLog  = false;
  modalIsAuto = true;
  document.getElementById('mBtnLog').classList.remove('active');

async function loadModalChart() {
  if (!modalChart || !modalCandle) return;
  try {
    const res  = await fetch(`/api/ohlcv?ticker=${modalTicker}&tf=${modalTF}`);
    const data = await res.json();
    if (data.error) return;
    const candles = data.candles || [];
    if (!candles.length) return;
    // Build prev close map for gain% calculation (Yahoo-style: vs prev candle close)
    modalPrevCloseMap = {};
    for (let i = 0; i < candles.length; i++) {
      modalPrevCloseMap[candles[i].time] = i > 0 ? candles[i - 1].close : candles[i].open;
    }
    modalCandle.setData(candles);
    modalVolume.setData(candles.map(c => ({
      time: c.time, value: c.volume,
      color: c.close >= c.open ? '#00e8a240' : '#ff4d6a40',
    })));
    requestAnimationFrame(() => { requestAnimationFrame(() => {
      if (candles.length > INIT_CANDLES) {
        modalChart.timeScale().setVisibleLogicalRange({
          from: candles.length - INIT_CANDLES,
          to:   candles.length - 1,
        });
      } else {
        modalChart.timeScale().fitContent();
      }
    }); });
    if (data.name) document.getElementById('mName').textContent = data.name;
    // Load overlay data after candles
    loadOverlayData(candles);
  } catch (_) {}
}

async function loadOverlayData(candles) {
  if (!modalChart || !ovlSeriesCM) return;
  try {
    const res  = await fetch(`/api/overlay?ticker=${modalTicker}&tf=${modalTF}`);
    const data = await res.json();
    if (data.error || !data.points || !data.points.length) {
      overlayDataCache = [];
      ovlSeriesCM.setData([]);
      ovlSeriesSM.setData([]);
      ovlSeriesBM.setData([]);
      return;
    }

    const candleArr = candles.map(c => c.time).sort((a,b) => a - b);
    const candleTimes = new Set(candleArr);

    function snapTime(t) {
      if (candleTimes.has(t)) return t;
      let best = null, bestDist = Infinity;
      for (const ct of candleArr) {
        const dist = Math.abs(ct - t);
        if (dist < bestDist) { bestDist = dist; best = ct; }
        if (ct > t) break;
      }
      return best;
    }

    // Build overlay map: snapped candle time → overlay point
    const ovlMap = {};
    for (const p of data.points) {
      const st = snapTime(p.time);
      if (st && !ovlMap[st]) ovlMap[st] = p;
    }

    // Fill ALL candle times with carry-forward cumulative
    const cmData = [], smData = [], bmData = [];
    overlayDataCache = [];
    let lastCum = { cm: 0, sm: 0, bm: 0 };

    for (const ct of candleArr) {
      const ovl = ovlMap[ct];
      if (ovl) {
        lastCum = { cm: ovl.cum_cm, sm: ovl.cum_sm, bm: ovl.cum_bm };
        overlayDataCache.push({ time: ct, cm: ovl.cm, sm: ovl.sm, bm: ovl.bm });
      } else {
        overlayDataCache.push({ time: ct, cm: 0, sm: 0, bm: 0 });
      }

      cmData.push({ time: ct, value: lastCum.cm });
      smData.push({ time: ct, value: lastCum.sm });
      bmData.push({ time: ct, value: lastCum.bm });
    }

    ovlSeriesCM.setData(cmData);
    ovlSeriesSM.setData(smData);
    ovlSeriesBM.setData(bmData);
  } catch (_) {
    overlayDataCache = [];
  }
}

async function loadTransactions() {
  const df = document.getElementById('trxDateFrom').value.trim();
  const dt = document.getElementById('trxDateTo').value.trim();
  if (!df || !dt) return;
  const url = `/api/transactions?ticker=${modalTicker}&date_from=${displayToApi(df)}&date_to=${displayToApi(dt)}`;

  const fmtGain = g => {
    if (g === null || g === undefined) return '—';
    const cls = g > 0 ? 'trx-gain-pos' : g < 0 ? 'trx-gain-neg' : '';
    return `<span class="${cls}">${g > 0 ? '+' : ''}${g.toFixed(2)}%</span>`;
  };

  const buildRows = (rows, mfCls) => {
    if (!rows.length) return `<tr><td colspan="5" class="trx-empty">Tidak ada data</td></tr>`;
    return rows.map(r => `<tr>
      <td>${r.time}</td>
      <td>${r.price ? r.price.toLocaleString('id-ID') : '—'}</td>
      <td>${fmtGain(r.gain_pct)}</td>
      <td><span class="${mfCls}">${fmtM(r.mf_num)}</span></td>
      <td>${r.vol_x ? r.vol_x.toFixed(1) + 'x' : '—'}</td>
    </tr>`).join('');
  };

  try {
    const res  = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    document.getElementById('smCount').textContent = `(${data.sm_count}TX)`;
    document.getElementById('bmCount').textContent = `(${data.bm_count}TX)`;
    document.getElementById('smBody').innerHTML = buildRows(data.sm, 'trx-mf-sm');
    document.getElementById('bmBody').innerHTML = buildRows(data.bm, 'trx-mf-bm');
  } catch (e) {
    const err = `<tr><td colspan="5" class="trx-empty">⚠ ${e.message}</td></tr>`;
    document.getElementById('smBody').innerHTML = err;
    document.getElementById('bmBody').innerHTML = err;
  }
}

        if (ct > t) break;
      }
      return best;
    }

    // Build overlay map: snapped candle time → overlay point
    const ovlMap = {};
    for (const p of data.points) {
      const st = snapTime(p.time);
      if (st && !ovlMap[st]) ovlMap[st] = p;
    }

    // Fill ALL candle times with carry-forward cumulative
    const cmData = [], smData = [], bmData = [];
    overlayDataCache = [];
    let lastCum = { cm: 0, sm: 0, bm: 0 };

    for (const ct of candleArr) {
      const ovl = ovlMap[ct];
      if (ovl) {
        lastCum = { cm: ovl.cum_cm, sm: ovl.cum_sm, bm: ovl.cum_bm };
        overlayDataCache.push({ time: ct, cm: ovl.cm, sm: ovl.sm, bm: ovl.bm });
      } else {
        overlayDataCache.push({ time: ct, cm: 0, sm: 0, bm: 0 });
      }

      cmData.push({ time: ct, value: lastCum.cm });
      smData.push({ time: ct, value: lastCum.sm });
      bmData.push({ time: ct, value: lastCum.bm });
    }

    ovlSeriesCM.setData(cmData);
    ovlSeriesSM.setData(smData);
    ovlSeriesBM.setData(bmData);
  } catch (_) {
    overlayDataCache = [];
  }
}

async function loadTransactions() {
  const df = document.getElementById('trxDateFrom').value.trim();
  const dt = document.getElementById('trxDateTo').value.trim();
  if (!df || !dt) return;
  const url = `/api/transactions?ticker=${modalTicker}&date_from=${displayToApi(df)}&date_to=${displayToApi(dt)}`;

  const fmtGain = g => {
    if (g === null || g === undefined) return '—';
    const cls = g > 0 ? 'trx-gain-pos' : g < 0 ? 'trx-gain-neg' : '';
    return `<span class="${cls}">${g > 0 ? '+' : ''}${g.toFixed(2)}%</span>`;
  };

  const buildRows = (rows, mfCls) => {
    if (!rows.length) return `<tr><td colspan="5" class="trx-empty">Tidak ada data</td></tr>`;
    return rows.map(r => `<tr>
      <td>${r.time}</td>
      <td>${r.price ? r.price.toLocaleString('id-ID') : '—'}</td>
      <td>${fmtGain(r.gain_pct)}</td>
      <td><span class="${mfCls}">${fmtM(r.mf_num)}</span></td>
      <td>${r.vol_x ? r.vol_x.toFixed(1) + 'x' : '—'}</td>
    </tr>`).join('');
  };

  try {
    const res  = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    document.getElementById('smCount').textContent = `(${data.sm_count}TX)`;
    document.getElementById('bmCount').textContent = `(${data.bm_count}TX)`;
    document.getElementById('smBody').innerHTML = buildRows(data.sm, 'trx-mf-sm');
    document.getElementById('bmBody').innerHTML = buildRows(data.bm, 'trx-mf-bm');
  } catch (e) {
    const err = `<tr><td colspan="5" class="trx-empty">⚠ ${e.message}</td></tr>`;
    document.getElementById('smBody').innerHTML = err;
    document.getElementById('bmBody').innerHTML = err;
  }
}

async function loadSectors(){
  const df=document.getElementById('dateFrom').value.trim(),dt=document.getElementById('dateTo').value.trim();
  if(!df||!dt)return;
  document.getElementById('sectorContainer').innerHTML='<div class="loading-wrap"><div class="spinner"></div> Memuat data sektor...</div>';
  document.getElementById('rowCount').textContent='';
  try{const res=await fetch(`/api/sector?date_from=${displayToApi(df)}&date_to=${displayToApi(dt)}&skip_gains=1`);const data=await res.json();if(data.error)throw new Error(data.error);
    _sectorData=data.sectors||[];renderSectors(_sectorData);

    loadSectorGainsAsync(displayToApi(df),displayToApi(dt),data.sectors||[]);
  }catch(e){document.getElementById('sectorContainer').innerHTML=`<div class="loading-wrap" style="color:var(--danger)">⚠ ${e.message}</div>`}

async function loadSectorGainsAsync(dateFrom,dateTo,sectors){
  // Fetch gains for each sector's members in parallel
  for(const s of sectors){
    if(!s.members||!s.members.length)continue;
    fetch(`/api/gains?tickers=${encodeURIComponent(s.members.join(','))}&date_from=${dateFrom}&date_to=${dateTo}`)
      .then(r=>r.json()).then(gains=>{
        if(gains.error)return;
        const gvals=s.members.map(t=>(gains[t]||{}).gain).filter(g=>g!==null&&g!==undefined);
        const avg=gvals.length?Math.round(gvals.reduce((a,b)=>a+b,0)/gvals.length*100)/100:null;
        s.gain_pct=avg;
        // Update the card gain element
        const el=document.getElementById('sg_'+s.name);
        if(el){
          el.textContent=avg===null?'—':(avg>0?'+':'')+avg.toFixed(2)+'%';
          el.className='sc-gain '+(avg===null?'zero':avg>0?'up':avg<0?'down':'zero');
        }
      }).catch(()=>{});
  }
}
