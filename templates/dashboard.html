<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zenith — Flow Dashboard</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script>if (typeof LightweightCharts === 'undefined') document.write('<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"><\/script>');</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pikaday/1.8.2/css/pikaday.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pikaday/1.8.2/pikaday.min.js"></script>
<style>
:root {
  --bg:       #080c10;
  --surface:  #0e1318;
  --surface2: #121920;
  --border:   #1a2230;
  --border2:  #243040;
  --accent:   #00e8a2;
  --accent2:  #4d9fff;
  --danger:   #ff4d6a;
  --text:     #c8d8e8;
  --muted:    #4a6070;
  --up:       #00e8a2;
  --down:     #ff4d6a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  min-height: 100vh;
  display: flex; flex-direction: column;
}

/* ── HEADER ─────────────────────────────────────── */
header {
  display: flex; align-items: center; gap: 16px;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky; top: 0; z-index: 200;
}
.logo {
  font-family: 'Space Mono', monospace;
  font-size: 12px; font-weight: 700;
  letter-spacing: .18em; color: var(--accent);
  text-transform: uppercase; white-space: nowrap;
}
.logo span { color: var(--muted); }
.nav-divider { width: 1px; height: 20px; background: var(--border); }
.nav-btn {
  background: none; border: 1px solid var(--border);
  color: var(--muted); border-radius: 5px;
  padding: 5px 14px; cursor: pointer;
  font-family: 'Space Mono', monospace;
  font-size: 11px; letter-spacing: .06em;
  text-decoration: none; transition: all .15s;
}
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.nav-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

/* search */
.ticker-search-wrap {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 12px;
  margin-left: auto; transition: border-color .2s;
}
.ticker-search-wrap:focus-within { border-color: var(--accent); }
.ticker-search-wrap input {
  background: none; border: none; outline: none;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 12px; width: 160px;
}
.ticker-search-wrap input::placeholder { color: var(--muted); }

/* ── STATS BAR ───────────────────────────────────── */
.stats-bar {
  display: flex; align-items: center; gap: 0;
  padding: 0 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.stat-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 20px 10px 0; margin-right: 20px;
  border-right: 1px solid var(--border);
  white-space: nowrap;
}
.stat-item:last-child { border-right: none; }
.stat-item .s-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: .12em;
  color: var(--muted); text-transform: uppercase;
}
.stat-item .s-val {
  font-family: 'Space Mono', monospace;
  font-size: 14px; font-weight: 700;
  color: var(--text);
}
.stat-item .s-val.up   { color: var(--up); }
.stat-item .s-val.down { color: var(--down); }
.stat-item .s-val.bm   { color: #ff8c42; }
.stat-item .s-val.neutral { color: var(--accent2); }
.stat-item[title] { cursor: help; }
.stat-item[title]:hover .s-label { color: var(--text); }

/* ── TOOLBAR ─────────────────────────────────────── */
.toolbar {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}

/* Date range picker */
.date-range {
  display: flex; align-items: center; gap: 8px;
}
.date-input {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); border-radius: 5px;
  padding: 6px 10px; font-family: 'Space Mono', monospace;
  font-size: 11px; outline: none; width: 108px;
  letter-spacing: .04em;
  transition: border-color .2s;
}
.date-input:focus { border-color: var(--accent); }
.date-input::placeholder { color: var(--muted); }
.date-arrow {
  width: 28px; height: 28px;
  background: var(--border); border: 1px solid var(--border2);
  border-radius: 5px; display: flex; align-items: center;
  justify-content: center; color: var(--muted); font-size: 13px;
}
.load-btn {
  background: var(--accent); color: var(--bg);
  border: none; border-radius: 5px;
  padding: 6px 16px; cursor: pointer;
  font-family: 'Space Mono', monospace;
  font-size: 11px; font-weight: 700;
  letter-spacing: .06em; transition: opacity .15s;
}
.load-btn:hover { opacity: .85; }

.row-count {
  margin-left: auto;
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--muted);
  letter-spacing: .06em;
}

/* ── TABLE ───────────────────────────────────────── */
.table-wrap {
  flex: 1; overflow: auto;
  padding: 0 24px 24px;
}
table {
  width: 100%; border-collapse: collapse;
  margin-top: 12px;
}
thead th {
  position: sticky; top: 0; z-index: 10;
  background: var(--surface2);
  border-bottom: 1px solid var(--border2);
  padding: 9px 12px;
  font-family: 'Space Mono', monospace;
  font-size: 9px; font-weight: 700;
  letter-spacing: .12em; color: var(--muted);
  text-align: right; text-transform: uppercase;
  white-space: nowrap; cursor: pointer;
  user-select: none;
  transition: color .15s;
}
thead th:first-child { text-align: left; }
thead th:hover { color: var(--text); }
thead th.sorted { color: var(--accent); }
thead th .sort-icon { margin-left: 4px; font-size: 8px; }

tbody tr {
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
  animation: rowIn .3s ease both;
}
tbody tr:hover { background: rgba(255,255,255,.03); }
@keyframes rowIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

td {
  padding: 9px 12px;
  text-align: right;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
td:first-child { text-align: left; }

/* Ticker cell */
.td-ticker {
  font-family: 'Space Mono', monospace;
  font-size: 12px; font-weight: 700;
  color: var(--text); letter-spacing: .04em;
}
.td-ticker:hover { color: var(--accent); }

/* Clean money cell with bar */
.cm-cell {
  position: relative;
  min-width: 130px;
}
.cm-bar {
  position: absolute; top: 0; bottom: 0;
  left: 50%; width: 0;
  transition: width .4s ease;
  opacity: .18; border-radius: 2px;
}
.cm-bar.pos { background: var(--up);   transform-origin: left; margin-left: 0; }
.cm-bar.neg { background: var(--down); transform-origin: right; }
.cm-val {
  position: relative; z-index: 1;
  font-family: 'Space Mono', monospace;
  font-size: 12px; font-weight: 700;
}
.cm-val.pos { color: var(--up); }
.cm-val.neg { color: var(--down); }

/* Numeric cells */
.td-num {
  font-family: 'Space Mono', monospace;
  font-size: 11px; color: var(--text);
}
.td-num.sm  { color: var(--accent2); }
.td-num.bm  { color: #ff8c42; }
.td-num.mfp { color: var(--up); }
.td-num.mfm { color: var(--down); }
.td-num.net-pos { color: var(--up); font-weight: 700; }
.td-num.net-neg { color: var(--down); font-weight: 700; }

/* RSM cell */
.rsm-val {
  font-family: 'Space Mono', monospace;
  font-size: 11px; font-weight: 700;
}

/* Gain cell */
.gain-val {
  font-family: 'Space Mono', monospace;
  font-size: 11px; font-weight: 700;
}
.gain-val.pos { color: var(--up); }
.gain-val.neg { color: var(--down); }
.gain-val.zero { color: var(--muted); }

/* Loading / empty */
.state-row td {
  text-align: center; padding: 60px;
  color: var(--muted); font-size: 13px;
}
.spinner-inline {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .7s linear infinite;
  vertical-align: middle; margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── MODAL ───────────────────────────────────────── */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.82);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  width: 100%;
  max-width: 1100px;
  height: 92vh;
  max-height: 92vh;
  display: flex; flex-direction: column;
  transform: scale(.97); transition: transform .2s;
  overflow: hidden;
  flex-shrink: 0;
}
.modal-backdrop.open .modal { transform: scale(1); }

.modal-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.modal-ticker {
  font-family: 'Space Mono', monospace;
  font-size: 16px; font-weight: 700;
  color: var(--text);
}
.modal-name { font-size: 12px; color: var(--muted); }
.modal-price {
  font-family: 'Space Mono', monospace;
  font-size: 18px; font-weight: 700; color: var(--text);
  margin-left: auto;
}

/* modal tf tabs */
.modal-tfs { display: flex; gap: 6px; }
.mtf-btn {
  background: none; border: 1px solid var(--border);
  color: var(--muted); border-radius: 4px;
  padding: 3px 10px; cursor: pointer;
  font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: .06em;
  transition: all .15s;
}
.mtf-btn:hover { border-color: var(--accent); color: var(--accent); }
.mtf-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

/* fit/log buttons */
.modal-scale-btns { display: flex; gap: 4px; }

.close-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 20px; line-height: 1;
  padding: 2px 6px; transition: color .15s;
}
.close-btn:hover { color: var(--danger); }

/* modal hover tooltip */
.m-hover-tooltip {
  position: absolute; top: 12px; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex; align-items: center; gap: 14px;
  background: rgba(14,19,24,.92);
  border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 12px;
  font-family: 'Space Mono', monospace; font-size: 10px;
  pointer-events: none; opacity: 0; transition: opacity .15s;
  white-space: nowrap;
}
.m-hover-tooltip.visible { opacity: 1; }
.mht-date { color: var(--muted); font-size: 9px; }
.mht-item { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.mht-lbl { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
.mht-v { font-size: 11px; font-weight: 700; color: var(--text); }
.mht-v.up { color: var(--up); }
.mht-v.down { color: var(--down); }
.mht-sep { width: 1px; height: 26px; background: var(--border); }

.modal-scroll {
  flex: 1 1 0;
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  /* custom scrollbar — tipis & nempel di ujung kanan */
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.modal-scroll::-webkit-scrollbar { width: 6px; }
.modal-scroll::-webkit-scrollbar-track { background: transparent; }
.modal-scroll::-webkit-scrollbar-thumb {
  background: var(--border2); border-radius: 3px;
}
.modal-scroll::-webkit-scrollbar-thumb:hover { background: var(--muted); }

.modal-chart-wrap {
  position: relative;
  height: 480px;
  flex-shrink: 0;
  overflow: visible;
}
#modalChart { width: 100%; height: 100%; display: block; position: relative; overflow: visible; }
/* Paksa LWC internal div tidak clip time axis */
#modalChart > div { overflow: visible !important; }


/* ── MODAL TRANSACTIONS ──────────────────────────────── */
.modal-body {
  padding: 16px 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.trx-section-title {
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: .14em;
  color: var(--muted); text-transform: uppercase;
  margin-bottom: 8px;
}
.trx-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.trx-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  max-height: 260px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.trx-box-header {
  padding: 6px 12px;
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: .1em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 8px; align-items: center;
  flex-shrink: 0;
  background: var(--bg);
  z-index: 1;
}
.trx-box-header.sm { color: var(--accent2); }
.trx-box-header.bm { color: #ff8c42; }
.trx-box-header .trx-count {
  color: var(--muted); font-size: 8px;
}
.trx-table-wrap {
  flex: 1 1 0;
  min-height: 0;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.trx-table-wrap::-webkit-scrollbar { width: 5px; }
.trx-table-wrap::-webkit-scrollbar-track { background: transparent; }
.trx-table-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.trx-table-wrap::-webkit-scrollbar-thumb:hover { background: var(--muted); }
.trx-table { width: 100%; border-collapse: collapse; }
.trx-table thead th {
  position: sticky; top: 0; z-index: 1;
  background: var(--bg);
}
.trx-table th {
  padding: 5px 10px;
  font-family: 'Space Mono', monospace;
  font-size: 8px; letter-spacing: .1em;
  color: var(--muted); text-transform: uppercase;
  text-align: right; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.trx-table th:first-child { text-align: left; }
.trx-table td {
  padding: 5px 10px;
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--text);
  text-align: right;
  border-bottom: 1px solid rgba(26,34,48,.5);
  white-space: nowrap;
}
.trx-table td:first-child { text-align: left; color: var(--muted); }
.trx-table tbody tr:last-child td { border-bottom: none; }
.trx-table tbody tr:hover { background: rgba(255,255,255,.02); }
.trx-gain-pos { color: var(--up); }
.trx-gain-neg { color: var(--down); }
.trx-mf-sm { color: var(--accent2); }
.trx-mf-bm { color: #ff8c42; }
.trx-empty { padding: 20px; text-align: center; color: var(--muted); font-size: 11px; }
.trx-loading { padding: 20px; text-align: center; color: var(--muted); font-size: 11px; }
/* ── PIKADAY DARK THEME ──────────────────────── */
.pika-single {
  background: var(--surface2) !important;
  border: 1px solid var(--border2) !important;
  border-radius: 8px !important;
  font-family: 'DM Sans', sans-serif !important;
  color: var(--text) !important;
  box-shadow: 0 8px 32px rgba(0,0,0,.5) !important;
}
.pika-title { padding: 8px 10px !important; }
.pika-label {
  background: transparent !important;
  color: var(--text) !important;
  font-family: 'Space Mono', monospace !important;
  font-size: 12px !important;
}
.pika-prev, .pika-next { color: var(--muted) !important; opacity: 1 !important; }
.pika-prev:hover, .pika-next:hover { color: var(--accent) !important; }
.pika-table th {
  color: var(--muted) !important;
  font-size: 10px !important;
  font-family: 'Space Mono', monospace !important;
}
.pika-button {
  background: transparent !important;
  color: var(--text) !important;
  border-radius: 4px !important;
  font-size: 12px !important;
  text-align: center !important;
}
.pika-button:hover, .is-selected .pika-button {
  background: var(--accent) !important;
  color: var(--bg) !important;
}
.is-today .pika-button { color: var(--accent) !important; font-weight: 700 !important; }
.is-disabled .pika-button { color: var(--muted) !important; opacity: .4 !important; }
.pika-select {
  background: var(--surface) !important;
  color: var(--text) !important;
  border: 1px solid var(--border) !important;
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">ZENITH <span>/ dashboard</span></div>
  <div class="nav-divider"></div>
  <a href="/" class="nav-btn">⬡ Chart</a>
  <a href="/dashboard" class="nav-btn active">⊞ Flow</a>
  <div class="nav-divider"></div>
  <div class="ticker-search-wrap">
    <span style="color:var(--muted);font-size:12px">⌕</span>
    <input type="text" id="tickerFilter" placeholder="Filter ticker..."/>
  </div>
</header>

<!-- STATS BAR -->
<div class="stats-bar" id="statsBar">
  <div class="stat-item" title="Smart Money">
    <span class="s-label">SM</span>
    <span class="s-val neutral" id="sSM">—</span>
  </div>
  <div class="stat-item" title="Bad Money">
    <span class="s-label">BM</span>
    <span class="s-val bm" id="sBM">—</span>
  </div>
  <div class="stat-item" title="Positive Money Flow">
    <span class="s-label">MF+</span>
    <span class="s-val up" id="sMFP">—</span>
  </div>
  <div class="stat-item" title="Negative Money Flow">
    <span class="s-label">MF−</span>
    <span class="s-val down" id="sMFM">—</span>
  </div>
  <div class="stat-item" title="Net Clean Money">
    <span class="s-label">NET CM</span>
    <span class="s-val" id="sNCM">—</span>
  </div>
  <div class="stat-item" title="Net Money Flow">
    <span class="s-label">NET MF</span>
    <span class="s-val" id="sNMF">—</span>
  </div>
  <div class="stat-item">
    <span class="s-label">Tickers</span>
    <span class="s-val neutral" id="sCount">—</span>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="date-range">
    <input type="text" class="date-input" id="dateFrom" placeholder="DD/MM/YYYY" maxlength="10"/>
    <div class="date-arrow">→</div>
    <input type="text" class="date-input" id="dateTo" placeholder="DD/MM/YYYY" maxlength="10"/>
  </div>
  <span class="row-count" id="rowCount"></span>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table id="flowTable">
    <thead>
      <tr>
        <th onclick="sortBy('ticker',event)"       data-col="ticker">TICKER <span class="sort-icon"></span></th>
        <th onclick="sortBy('price',event)"         data-col="price" title="Harga terakhir">PRICE <span class="sort-icon"></span></th>
        <th onclick="sortBy('clean_money',event)"  data-col="clean_money">CLEAN MONEY <span class="sort-icon">▼</span></th>
        <th onclick="sortBy('sm_val',event)"       data-col="sm_val" title="Smart Money">SM VAL <span class="sort-icon"></span></th>
        <th onclick="sortBy('bm_val',event)"       data-col="bm_val" title="Bad Money">BM VAL <span class="sort-icon"></span></th>
        <th onclick="sortBy('rsm',event)"          data-col="rsm" title="Smart Money Ratio">RSM <span class="sort-icon"></span></th>
        <th onclick="sortBy('mf_plus',event)"      data-col="mf_plus" title="Positive Money Flow">MF+ <span class="sort-icon"></span></th>
        <th onclick="sortBy('mf_minus',event)"     data-col="mf_minus" title="Negative Money Flow">MF− <span class="sort-icon"></span></th>
        <th onclick="sortBy('net_mf',event)"       data-col="net_mf" title="Net Money Flow">NET MF <span class="sort-icon"></span></th>
        <th onclick="sortBy('gain_pct',event)"     data-col="gain_pct" title="% perubahan harga">GAIN% <span class="sort-icon"></span></th>
      </tr>
    </thead>
    <tbody id="flowBody">
      <tr class="state-row"><td colspan="10"><span class="spinner-inline"></span>Memuat data...</td></tr>
    </tbody>
  </table>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop" onclick="handleBackdropClick(event)">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <div>
        <div class="modal-ticker" id="mTicker">—</div>
        <div class="modal-name" id="mName">—</div>
      </div>
      <div class="modal-tfs">
        <button class="mtf-btn" data-tf="5m"  onclick="setModalTF('5m')">5m</button>
        <button class="mtf-btn" data-tf="15m" onclick="setModalTF('15m')">15m</button>
        <button class="mtf-btn" data-tf="30m" onclick="setModalTF('30m')">30m</button>
        <button class="mtf-btn" data-tf="1h"  onclick="setModalTF('1h')">1h</button>
        <button class="mtf-btn active" data-tf="1d" onclick="setModalTF('1d')">1D</button>
      </div>
      <div style="flex:1"></div>
      <div class="modal-scale-btns">
        <button class="mtf-btn" id="mBtnLog"  onclick="modalToggleLog()"  title="Logarithmic scale">L</button>
        <button class="mtf-btn active" id="mBtnAuto" onclick="modalToggleAuto()" title="Auto scale">A</button>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-scroll">
    <div class="modal-chart-wrap">
      <div class="m-hover-tooltip" id="mHoverTooltip">
        <span class="mht-date" id="mHtDate">—</span>
        <div class="mht-sep"></div>
        <div class="mht-item"><span class="mht-lbl">O</span><span class="mht-v" id="mHtO">—</span></div>
        <div class="mht-item"><span class="mht-lbl">H</span><span class="mht-v up" id="mHtH">—</span></div>
        <div class="mht-item"><span class="mht-lbl">L</span><span class="mht-v down" id="mHtL">—</span></div>
        <div class="mht-item"><span class="mht-lbl">C</span><span class="mht-v" id="mHtC">—</span></div>
        <div class="mht-sep"></div>
        <div class="mht-item"><span class="mht-lbl">Vol</span><span class="mht-v" id="mHtVol">—</span></div>
      </div>
      <div id="modalChart"></div>
    </div>

    <!-- TRANSAKSI SECTION -->
    <div class="modal-body" id="modalBody">
      <div>
        <div class="trx-section-title">Transaksi SM &amp; BM</div>
        <div class="trx-grid">
          <div class="trx-box">
            <div class="trx-box-header sm">
              Smart Money <span class="trx-count" id="smCount"></span>
            </div>
            <div class="trx-table-wrap">
            <table class="trx-table">
              <thead><tr>
                <th>WAKTU</th><th>PRICE</th><th>GAIN</th><th>MF</th><th>VOLX</th>
              </tr></thead>
              <tbody id="smBody"><tr><td colspan="5" class="trx-loading">Memuat...</td></tr></tbody>
            </table>
            </div>
          </div>
          <div class="trx-box">
            <div class="trx-box-header bm">
              Bad Money <span class="trx-count" id="bmCount"></span>
            </div>
            <div class="trx-table-wrap">
            <table class="trx-table">
              <thead><tr>
                <th>WAKTU</th><th>PRICE</th><th>GAIN</th><th>MF</th><th>VOLX</th>
              </tr></thead>
              <tbody id="bmBody"><tr><td colspan="5" class="trx-loading">Memuat...</td></tr></tbody>
            </table>
            </div>
          </div>
        </div>
      </div>
    </div>
    </div><!-- end modal-scroll -->
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────
let allRows      = [];
let sortCols     = [{ col: 'clean_money', asc: false }]; // multi-sort
let filterText   = '';
let modalChart   = null;
let modalCandle  = null;
let modalVolume  = null;
let modalTF      = '1d';
let modalTicker  = '';
let modalIsLog   = false;
let modalIsAuto  = true;
const INIT_CANDLES = 150;

// ── Date helpers ──────────────────────────────────────────────────────
// Input/display: DD/MM/YYYY
// API: DD-MM-YYYY

function displayToApi(ddslashmmslashyyyy) {
  // DD/MM/YYYY → DD-MM-YYYY
  return ddslashmmslashyyyy.replace(/\//g, '-');
}
function todayDDMMYYYY() {
  // Pakai WIB (UTC+7)
  const now = new Date(Date.now() + 7 * 3600 * 1000);
  const d   = String(now.getUTCDate()).padStart(2, '0');
  const m   = String(now.getUTCMonth() + 1).padStart(2, '0');
  const y   = now.getUTCFullYear();
  return `${d}/${m}/${y}`;
}
function isValidDate(s) {
  // Validasi DD/MM/YYYY
  if (!/^\d{2}\/\d{2}\/\d{4}$/.test(s)) return false;
  const [d, m, y] = s.split('/').map(Number);
  const dt = new Date(y, m - 1, d);
  return dt.getFullYear() === y && dt.getMonth() === m - 1 && dt.getDate() === d;
}
function autoFormatDate(input) {
  // Auto-insert slash saat mengetik
  let v = input.value.replace(/\D/g, '');
  if (v.length >= 3) v = v.slice(0,2) + '/' + v.slice(2);
  if (v.length >= 6) v = v.slice(0,5) + '/' + v.slice(5);
  input.value = v.slice(0, 10);
}

// ── Init dates & Pikaday ─────────────────────────────────────────────
let pickerFrom, pickerTo;

window.addEventListener('DOMContentLoaded', () => {
  const todayStr = todayDDMMYYYY();
  const [dd, mm, yyyy] = todayStr.split('/').map(Number);
  const todayDate = new Date(yyyy, mm - 1, dd);

  const pikadayOpts = {
    format:     'DD/MM/YYYY',
    toString:   date => {
      const d = String(date.getDate()).padStart(2,'0');
      const m = String(date.getMonth()+1).padStart(2,'0');
      return `${d}/${m}/${date.getFullYear()}`;
    },
    parse: str => {
      const [d,m,y] = str.split('/').map(Number);
      return new Date(y, m-1, d);
    },
    i18n: {
      previousMonth: '‹', nextMonth: '›',
      months: ['Januari','Februari','Maret','April','Mei','Juni',
               'Juli','Agustus','September','Oktober','November','Desember'],
      weekdays: ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'],
      weekdaysShort: ['Min','Sen','Sel','Rab','Kam','Jum','Sab'],
    },
    maxDate: new Date(),
  };

  pickerFrom = new Pikaday({
    ...pikadayOpts,
    field:       document.getElementById('dateFrom'),
    defaultDate: todayDate,
    setDefaultDate: true,
    onSelect: date => {
      if (pickerTo && date > pickerTo.getDate()) {
        pickerTo.setDate(date);
      }
      loadFlow();
    },
  });

  pickerTo = new Pikaday({
    ...pikadayOpts,
    field:       document.getElementById('dateTo'),
    defaultDate: todayDate,
    setDefaultDate: true,
    onSelect: () => loadFlow(),
  });

  loadFlow();

  document.getElementById('tickerFilter').addEventListener('input', e => {
    filterText = e.target.value.trim().toUpperCase();
    renderTable();
  });
});

// ── Load flow data ────────────────────────────────────────────────────
async function loadFlow() {
  const df = document.getElementById('dateFrom').value.trim();
  const dt = document.getElementById('dateTo').value.trim();

  if (!isValidDate(df) || !isValidDate(dt)) {
    showError('Format tanggal salah. Gunakan DD/MM/YYYY');
    return;
  }

  showLoading();
  try {
    const res  = await fetch(`/api/flow?date_from=${displayToApi(df)}&date_to=${displayToApi(dt)}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allRows = data.tickers || [];
    updateStats(data.totals || {});
    renderTable();
  } catch (e) {
    showError(e.message);
  }
}

// ── Stats bar ─────────────────────────────────────────────────────────
function fmtM(v) {
  if (v === null || v === undefined) return '—';
  const abs = Math.abs(v);
  const s   = v < 0 ? '-' : '';
  if (abs >= 1000) return s + (abs/1000).toFixed(1) + 'B';
  return s + abs.toFixed(1) + 'M';
}
function updateStats(t) {
  const setV = (id, v, cls) => {
    const el = document.getElementById(id);
    el.textContent = (v !== null && v !== undefined) ? fmtM(v) : '—';
    el.className = 's-val ' + (cls || (v !== null && v >= 0 ? 'up' : 'down'));
  };
  const set = (id, v, cls) => {
    const el = document.getElementById(id);
    el.textContent = fmtM(v);
    el.className = 's-val ' + (cls || (v >= 0 ? 'up' : 'down'));
  };
  set('sSM',  t.sm,     'neutral');
  set('sBM',  t.bm,     'bm');


  set('sNCM', t.net_cm);

  document.getElementById('sCount').textContent = t.count || '—';
}

// ── Sort ──────────────────────────────────────────────────────────────
// Klik biasa   → primary sort (reset semua sort lain)
// Shift+klik   → tambah/toggle kolom sort sekunder
function sortBy(col, event) {
  if (event) event.stopPropagation();
  const shift = event && event.shiftKey;

  if (shift) {
    // Shift+klik: tambah/toggle kolom sort sekunder
    const idx = sortCols.findIndex(s => s.col === col);
    if (idx >= 0) {
      sortCols[idx].asc = !sortCols[idx].asc;
    } else {
      sortCols.push({ col, asc: col === 'ticker' });
    }
  } else {
    // Klik biasa: primary sort
    const idx = sortCols.findIndex(s => s.col === col);
    if (idx === 0 && sortCols.length === 1) {
      sortCols[0].asc = !sortCols[0].asc;
    } else {
      sortCols.length = 0;
      sortCols.push({ col, asc: col === 'ticker' });
    }
  }

  // Update header icons
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    const c  = th.dataset.col;
    const si = th.querySelector('.sort-icon');
    const i  = sortCols.findIndex(s => s.col === c);
    th.classList.toggle('sorted', i >= 0);
    if (i >= 0) {
      si.textContent = (sortCols[i].asc ? '▲' : '▼') + (sortCols.length > 1 ? (i+1) : '');
    } else {
      si.textContent = '';
    }
  });

  renderTable();
}

// ── Render table ──────────────────────────────────────────────────────
function renderTable() {
  let rows = allRows.filter(r =>
    !filterText || r.ticker.includes(filterText)
  );

  // Multi-sort
  rows.sort((a, b) => {
    for (const { col, asc } of sortCols) {
      let av = a[col], bv = b[col];
      if (av === null || av === undefined) av = asc ? Infinity : -Infinity;
      if (bv === null || bv === undefined) bv = asc ? Infinity : -Infinity;
      let cmp;
      if (typeof av === 'string') cmp = asc ? av.localeCompare(bv) : bv.localeCompare(av);
      else cmp = asc ? av - bv : bv - av;
      if (cmp !== 0) return cmp;
    }
    return 0;
  });

  document.getElementById('rowCount').textContent = `${rows.length} ticker`;

  const maxCM = Math.max(...rows.map(r => Math.abs(r.clean_money)), 1);

  const tbody = document.getElementById('flowBody');
  if (rows.length === 0) {
    tbody.innerHTML = `<tr class="state-row"><td colspan="10">Tidak ada data untuk tanggal ini</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map((r, i) => {
    const barPct  = Math.min(Math.abs(r.clean_money) / maxCM * 48, 48);
    const barPos  = r.clean_money >= 0;
    const barStyle = barPos
      ? `left:50%; width:${barPct}%;`
      : `right:50%; width:${barPct}%;`;

    const rsmColor = rsmToColor(r.rsm);
    const gainCls  = r.gain_pct === null ? 'zero' : r.gain_pct > 0 ? 'pos' : r.gain_pct < 0 ? 'neg' : 'zero';
    const gainStr  = r.gain_pct === null ? '—' : (r.gain_pct > 0 ? '+' : '') + r.gain_pct.toFixed(2) + '%';

    return `<tr onclick="openModal('${r.ticker}')" style="animation-delay:${Math.min(i*15,300)}ms">
      <td><span class="td-ticker">${r.ticker}</span></td>
      <td><span class="td-num" style="color:var(--text)">${r.price !== null && r.price !== undefined ? r.price.toLocaleString('id-ID') : '—'}</span></td>
      <td class="cm-cell">
        <div class="cm-bar ${barPos ? 'pos' : 'neg'}" style="${barStyle}"></div>
        <span class="cm-val ${barPos ? 'pos' : 'neg'}">${fmtM(r.clean_money)}</span>
      </td>
      <td><span class="td-num sm">${fmtM(r.sm_val)}</span></td>
      <td><span class="td-num bm">${fmtM(r.bm_val)}</span></td>
      <td><span class="rsm-val" style="color:${rsmColor}">${r.rsm.toFixed(1)}%</span></td>
      <td><span class="td-num mfp">${r.mf_plus  !== null ? fmtM(r.mf_plus)  : '—'}</span></td>
      <td><span class="td-num mfm">${r.mf_minus !== null ? fmtM(r.mf_minus) : '—'}</span></td>
      <td><span class="td-num ${r.net_mf === null ? '' : r.net_mf >= 0 ? 'net-pos' : 'net-neg'}">${r.net_mf !== null ? fmtM(r.net_mf) : '—'}</span></td>
      <td><span class="gain-val ${gainCls}">${gainStr}</span></td>
    </tr>`;
  }).join('');
}

function rsmToColor(rsm) {
  // 0% = merah, 50% = kuning, 100% = hijau
  if (rsm >= 70) return '#00e8a2';
  if (rsm >= 50) return `hsl(${(rsm - 50) * 3.6 + 50}, 80%, 55%)`;
  if (rsm >= 30) return `hsl(${rsm * 1.2}, 80%, 55%)`;
  return '#ff4d6a';
}

function showLoading() {
  document.getElementById('flowBody').innerHTML =
    `<tr class="state-row"><td colspan="10"><span class="spinner-inline"></span>Memuat data...</td></tr>`;
}
function showError(msg) {
  document.getElementById('flowBody').innerHTML =
    `<tr class="state-row"><td colspan="10">⚠ ${msg}</td></tr>`;
}

// ── MODAL ─────────────────────────────────────────────────────────────
function openModal(ticker) {
  modalTicker = ticker;
  modalTF     = '1d';
  modalIsLog  = false;
  modalIsAuto = true;
  document.getElementById('mBtnLog').classList.remove('active');
  document.getElementById('mBtnAuto').classList.add('active');
  document.querySelectorAll('.mtf-btn[data-tf]').forEach(b =>
    b.classList.toggle('active', b.dataset.tf === '1d')
  );
  document.getElementById('mTicker').textContent = ticker;
  document.getElementById('mName').textContent   = '—';
  document.getElementById('modalBackdrop').classList.add('open');
  // Defer agar modal selesai render dulu, baru init chart
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      initModalChart();
      loadModalChart();
      loadTransactions();
    });
  });
}
function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
  if (window._modalChartRO) { window._modalChartRO.disconnect(); window._modalChartRO = null; }
  if (modalChart) { modalChart.remove(); modalChart = null; modalCandle = null; modalVolume = null; }
}
function handleBackdropClick(e) {
  if (e.target === document.getElementById('modalBackdrop')) closeModal();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function initModalChart() {
  if (modalChart) { modalChart.remove(); modalChart = null; }
  const container = document.getElementById('modalChart');
  const rect = container.getBoundingClientRect();
  modalChart = LightweightCharts.createChart(container, {
    width: Math.floor(rect.width),
    height: Math.floor(rect.height),
    layout: { background: { color: '#0e1318' }, textColor: '#4a6070' },
    grid:   { vertLines: { color: '#1a2230' }, horzLines: { color: '#1a2230' } },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: '#4a6070', labelBackgroundColor: '#1a2230' },
      horzLine: { color: '#4a6070', labelBackgroundColor: '#1a2230' },
    },
    rightPriceScale: { borderColor: '#1a2230' },
    timeScale: {
      borderColor: '#1a2230', timeVisible: true, secondsVisible: false,
      tickMarkFormatter: t => {
        const d = new Date(t * 1000);
        const h = String(d.getUTCHours()).padStart(2,'0');
        const m = String(d.getUTCMinutes()).padStart(2,'0');
        const day = d.getUTCDate();
        const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getUTCMonth()];
        return modalTF === '1d' ? `${day} ${mon}` : `${h}:${m}`;
      },
    },
    localization: { priceFormatter: p => Math.round(p).toLocaleString('id-ID') },
  });

  modalCandle = modalChart.addCandlestickSeries({
    upColor: '#00e8a2', downColor: '#ff4d6a',
    borderUpColor: '#00e8a2', borderDownColor: '#ff4d6a',
    wickUpColor:   '#00e8a2', wickDownColor:   '#ff4d6a',
  });
  modalVolume = modalChart.addHistogramSeries({
    color: '#1a2230', priceFormat: { type: 'volume' },
    priceScaleId: 'vol', scaleMargins: { top: 0.85, bottom: 0 },
  });
  modalChart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.85, bottom: 0 } });

  // Apply auto scale default
  modalChart.priceScale('right').applyOptions({ autoScale: true, scaleMargins: { top: 0.1, bottom: 0.2 } });

  // Hover tooltip
  modalChart.subscribeCrosshairMove(param => {
    const tt = document.getElementById('mHoverTooltip');
    if (!param.time || !param.seriesData) { tt.classList.remove('visible'); return; }
    const bar = param.seriesData.get(modalCandle);
    if (!bar) { tt.classList.remove('visible'); return; }
    const fmt = v => Math.round(v).toLocaleString('id-ID');
    const fmtV = v => {
      if (!v) return '—';
      if (v >= 1e9) return (v/1e9).toFixed(1)+'B';
      if (v >= 1e6) return (v/1e6).toFixed(1)+'M';
      if (v >= 1e3) return (v/1e3).toFixed(1)+'K';
      return String(v);
    };
    const d = new Date(param.time * 1000);
    const pad = n => String(n).padStart(2,'0');
    const mons = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const ds = modalTF === '1d'
      ? `${d.getUTCDate()} ${mons[d.getUTCMonth()]} ${d.getUTCFullYear()}`
      : `${d.getUTCDate()} ${mons[d.getUTCMonth()]} ${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}`;
    document.getElementById('mHtDate').textContent = ds;
    document.getElementById('mHtO').textContent    = fmt(bar.open);
    document.getElementById('mHtH').textContent    = fmt(bar.high);
    document.getElementById('mHtL').textContent    = fmt(bar.low);
    const cEl = document.getElementById('mHtC');
    cEl.textContent = fmt(bar.close);
    cEl.className   = 'mht-v ' + (bar.close >= bar.open ? 'up' : 'down');
    const vb = param.seriesData.get(modalVolume);
    document.getElementById('mHtVol').textContent = vb ? fmtV(vb.value) : '—';
    tt.classList.add('visible');
  });

  // ResizeObserver — handle resize tanpa autoSize
  if (window._modalChartRO) window._modalChartRO.disconnect();
  window._modalChartRO = new ResizeObserver(entries => {
    for (const e of entries) {
      if (modalChart) {
        modalChart.applyOptions({
          width: Math.floor(e.contentRect.width),
          height: Math.floor(e.contentRect.height),
        });
      }
    }
  });
  window._modalChartRO.observe(container);
}

async function loadModalChart() {
  if (!modalChart || !modalCandle) return;
  try {
    const res  = await fetch(`/api/ohlcv?ticker=${modalTicker}&tf=${modalTF}`);
    const data = await res.json();
    if (data.error) return;
    const candles = data.candles || [];
    if (!candles.length) return;
    modalCandle.setData(candles);
    modalVolume.setData(candles.map(c => ({
      time: c.time, value: c.volume,
      color: c.close >= c.open ? '#00e8a240' : '#ff4d6a40',
    })));
    if (candles.length > INIT_CANDLES) {
      modalChart.timeScale().setVisibleRange({
        from: candles[candles.length - INIT_CANDLES].time,
        to:   candles[candles.length - 1].time,
      });
    } else {
      modalChart.timeScale().fitContent();
    }
    if (data.name) document.getElementById('mName').textContent = data.name;
  } catch (_) {}
}


async function loadTransactions() {
  const df = document.getElementById('dateFrom').value.trim();
  const dt = document.getElementById('dateTo').value.trim();
  const url = `/api/transactions?ticker=${modalTicker}&date_from=${displayToApi(df)}&date_to=${displayToApi(dt)}`;

  const fmtGain = g => {
    if (g === null || g === undefined) return '—';
    const cls = g > 0 ? 'trx-gain-pos' : g < 0 ? 'trx-gain-neg' : '';
    return `<span class="${cls}">${g > 0 ? '+' : ''}${g.toFixed(2)}%</span>`;
  };

  const buildRows = (rows, mfCls) => {
    if (!rows.length) return `<tr><td colspan="5" class="trx-empty">Tidak ada data</td></tr>`;
    return rows.map(r => `<tr>
      <td>${r.time}</td>
      <td>${r.price ? r.price.toLocaleString('id-ID') : '—'}</td>
      <td>${fmtGain(r.gain_pct)}</td>
      <td><span class="${mfCls}">${r.mf || '—'}</span></td>
      <td>${r.vol_x ? r.vol_x.toFixed(1) + 'x' : '—'}</td>
    </tr>`).join('');
  };

  try {
    const res  = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    document.getElementById('smCount').textContent = `(${data.sm_count}TX)`;
    document.getElementById('bmCount').textContent = `(${data.bm_count}TX)`;
    document.getElementById('smBody').innerHTML = buildRows(data.sm, 'trx-mf-sm');
    document.getElementById('bmBody').innerHTML = buildRows(data.bm, 'trx-mf-bm');
  } catch (e) {
    const err = `<tr><td colspan="5" class="trx-empty">⚠ ${e.message}</td></tr>`;
    document.getElementById('smBody').innerHTML = err;
    document.getElementById('bmBody').innerHTML = err;
  }
}

function setModalTF(tf) {
  modalTF = tf;
  document.querySelectorAll('.mtf-btn[data-tf]').forEach(b =>
    b.classList.toggle('active', b.dataset.tf === tf)
  );
  loadModalChart();
}
function modalToggleLog() {
  if (!modalChart) return;
  modalIsLog = !modalIsLog;
  modalChart.priceScale('right').applyOptions({ mode: modalIsLog ? 1 : 0 });
  document.getElementById('mBtnLog').classList.toggle('active', modalIsLog);
}

function modalToggleAuto() {
  if (!modalChart) return;
  modalIsAuto = !modalIsAuto;
  modalChart.priceScale('right').applyOptions({
    autoScale: modalIsAuto,
    scaleMargins: { top: 0.1, bottom: 0.2 },
  });
  modalChart.applyOptions({
    handleScale: {
      axisPressedMouseMove: {
        price: !modalIsAuto,
        time: true,
      },
    },
  });
  document.getElementById('mBtnAuto').classList.toggle('active', modalIsAuto);
}

// ── Escape tutup modal ────────────────────────────────────────────────
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
